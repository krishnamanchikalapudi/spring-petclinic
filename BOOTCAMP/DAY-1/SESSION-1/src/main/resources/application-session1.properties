# ─────────────────────────────────────────────────────────────────────────────
# Session 1 — AI Configuration Properties
# File: src/main/resources/application-session1.properties
#
# HOW TO USE:
#   Option A (recommended): Append to application.properties
#   Option B: Run with profile: ./mvnw spring-boot:run -Dspring.profiles.active=h2,session1
#
# These properties extend (not replace) the existing application-ollama.properties
# ─────────────────────────────────────────────────────────────────────────────

# ── Ollama connection (already in application-ollama.properties — verify match) ──
ollama.base-url=http://localhost:11434
ollama.model=qwen3.5:0.8b

# ── Session 1: VetAssistant configuration ─────────────────────────────────────
petclinic.bootcamp.prompt.vet-assistant-version=v1
petclinic.bootcamp.model.chat=qwen3.5:0.8b
petclinic.bootcamp.model.embed=nomic-embed-text
petclinic.bootcamp.inference.timeout-seconds=30

# ── Actuator — expose prometheus for AI metrics dashboard (Ch 20) ─────────────
# Already set in application.properties — verify it includes prometheus:
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ── Logging — show AI service calls during labs ───────────────────────────────
logging.level.org.springframework.samples.petclinic.ai=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
# Disable verbose Spring AI auto-config noise:
logging.level.org.springframework.ai=WARN

# ── Virtual threads (Java 25 — enable Spring MVC virtual thread dispatch) ─────
spring.threads.virtual.enabled=true

# ── H2 console (development only — see data at http://localhost:8080/h2-console) ─
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:petclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
