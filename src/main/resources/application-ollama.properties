# ─────────────────────────────────────────────────────────────────────────────
# AI Chat Configuration — Ollama (local)
# Add these lines to src/main/resources/application.properties
# ─────────────────────────────────────────────────────────────────────────────

# URL of the locally-running Ollama service (default shown)
ollama.base-url=http://localhost:11434

# Model to use for chat (must be pulled first: ollama pull <model>)
ollama.model=llama3.2:1b


management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=shutdown