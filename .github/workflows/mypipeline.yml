name: "BOOTCAMP Pipeline"
on:
  push:
    branches: 
      - 'bootcamp'
permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  security-events: write # Required for uploading code scanning.
  attestations: write
  pages: write
env:
  BUILD_NAME: "bootcamp-spring-petclinic"
  DOCKER_REGISTRY: 'docker.io'
  DOCKER_ORG: 'krishnamanchikalapudi'
  DEFAULT_WORKSPACE: "${{github.workspace}}"  # /home/runner/work/spring-petclinic/spring-petclinic
jobs:
  defaultPackage:
    name: "Default package"
    runs-on: ubuntu-latest # https://github.com/actions/runner-images
    outputs:
      image_todays_tag: ${{ steps.set_var.outputs.TODAYS_DATE }}
    strategy:
      matrix:
        java: [ '25' ]
    env:
        BUILD_ID: "" # "ga-${{github.run_number}}"
        DOCKER_BUILDX_PLATFORMS: 'linux/amd64,linux/arm64'
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
        - name: "Clone VCS"
          uses: actions/checkout@v5     # ref: https://github.com/actions/checkout
        
        - name: "Setup JDK ${{matrix.java}}"
          uses: actions/setup-java@v5   # ref https://github.com/actions/setup-java (Node 24)
          with:
            distribution: 'temurin'
            java-version: ${{matrix.java}}  # 17
            cache: 'maven'
            cache-dependency-path: 'pom.xml'
        
        - name: "Env vars and info"
          id: set_var
          run: |
            echo "ARTIFACT_NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV
            echo "ARTIFACT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

        - name: "Docker: authentication" 
          id: config-docker
          uses: docker/login-action@v4      # ref https://github.com/marketplace/actions/docker-login (Node 24)
          with:
            registry: ${{ env.DOCKER_REGISTRY }}
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{secrets.DOCKERHUB_PASSWORD }}

        - name: "Docker: Set up QEMU emulation"
          uses: docker/setup-qemu-action@v4

        - name: "Docker: Set up Buildx"
          uses: docker/setup-buildx-action@v4   # ref: https://github.com/marketplace/actions/docker-setup-buildx (Node 24)
          with:
            use: true
            platforms: ${{env.DOCKER_BUILDX_PLATFORMS}}
            # install: true

        - name: "Maven: package"
          run: |
            mvn clean package -DskipTests -Denforcer.skip

        - name: "Docker build and push"
          id: build
          uses: docker/build-push-action@v7     # https://github.com/docker/build-push-action (Node 24)  
          env:
            DOCKER_BUILD_SUMMARY: false
          with:
            push: true
            context: .
            provenance: mode=max
            file: ./Dockerfile
            platforms: ${{env.DOCKER_BUILDX_PLATFORMS}}
            sbom: true
            build-args: |
              JAR_FILE=./target/${{env.ARTIFACT_NAME}}-${{env.ARTIFACT_VERSION}}.jar
            tags: |
              ${{env.DOCKER_ORG}}/${{env.BUILD_NAME}}:${{env.BUILD_ID}}
              ${{ env.DOCKER_REGISTRY }}/${{env.DOCKER_ORG}}/${{env.BUILD_NAME}}:${{env.BUILD_ID}}

